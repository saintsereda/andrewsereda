        <!-- JavaScript for visitor counter — реальний глобальний підрахунок через Cloudflare Worker -->
        <script>
            // 🔧 ЗАМІНИ на URL свого Worker'а (див. крок 4 інструкції):
            const COUNTER_API = 'https://visitor-counter.5yjxrnsdbx.workers.dev';

            document.addEventListener('DOMContentLoaded', async function () {
                const el = document.getElementById('counter');
                const VISITED_KEY = 'hasVisited';

                try {
                    // Нового унікального відвідувача рахуємо лише раз на цей браузер.
                    const firstVisit = !localStorage.getItem(VISITED_KEY);

                    const res = await fetch(COUNTER_API, {
                        method: firstVisit ? 'POST' : 'GET',
                    });
                    const data = await res.json();

                    if (firstVisit) {
                        localStorage.setItem(VISITED_KEY, '1');
                    }

                    el.textContent = data.count.toLocaleString('en-US') + ' visitors';
                } catch (e) {
                    // Якщо лічильник недоступний — нічого не показуємо, сайт не ламається.
                    el.textContent = '';
                }
            });
        </script>
