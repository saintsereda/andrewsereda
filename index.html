<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrew Sereda - Senior Experience Designer</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
            overflow-x: hidden;
        }
        
        .container {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            box-sizing: border-box;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-left {
            display: flex;
            gap: 48px;
        }
        
        .nav-link {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        
        .nav-logo {
            font-weight: 500;
        }
        
        .nav-action {
            font-weight: 500;
            text-decoration: underline;
        }
        
        .content {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 920px;
            margin: 340px auto 0;
            box-sizing: border-box;
        }
        
        .intro-paragraph {
            font-size: 32px;
            line-height: 44px;
            font-weight: normal;
            color: black;
            margin: 0;
            padding: 0;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .text-part {
            transition: opacity 0.3s ease;
        }
        
        .company {
            text-decoration: underline;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.3s ease;
            color: inherit;
        }
        
        /* Media queries for responsive design */
        @media (max-width: 768px) {
            .intro-paragraph {
                font-size: 24px;
                line-height: 34px;
            }
            
            .content {
                margin-top: 200px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            
            .intro-paragraph {
                font-size: 20px;
                line-height: 32px;
            }
            
            .content {
                margin-top: 120px;
            }
            
            .nav-left {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <!-- Navigation -->
            <nav>
                <div class="nav-left">
                    <a class="nav-link nav-logo">A — S</a>
                    <a class="nav-link">About (1)</a>
                    <a class="nav-link">Projects (2)</a>
                </div>
                <a class="nav-link nav-action">Connect</a>
            </nav>
            
            <!-- Main content -->
            <section class="content">
                <p class="intro-paragraph">
                    <span class="text-part">I'm Andrew, a Senior Experience Designer at </span>
                    <a href="https://www.windmill.digital" class="company company-windmill">Windmill,</a>
                    <span class="text-part">passionate about crafting intuitive, purposeful experiences where design meets impact. I'm also building </span>
                    <a href="https://www.getexpensa.com" class="company company-expensa">Expensa,</a>
                    <span class="text-part">an expense management app - driven by my curiosity for AI and thoughtful UX.</span>
                </p>
            </section>
        </div>
    </main>

    <script>
        // JavaScript for hover effect
        document.querySelectorAll('.company').forEach(company => {
            company.addEventListener('mouseenter', () => {
                // Fade all text parts
                document.querySelectorAll('.text-part').forEach(el => {
                    el.style.opacity = '0.64';
                });
                
                // Fade other companies
                document.querySelectorAll('.company').forEach(el => {
                    if (el !== company) {
                        el.style.opacity = '0.64';
                    }
                });
                
                // Keep hovered company at full opacity
                company.style.opacity = '1';
            });
            
            company.addEventListener('mouseleave', () => {
                // Restore all to full opacity
                document.querySelectorAll('.text-part, .company').forEach(el => {
                    el.style.opacity = '1';
                });
            });
        });
    </script>
</body>
</html>
