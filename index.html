<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Sereda - Senior Experience Designer</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
        }
        
        .container {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-left {
            display: flex;
            gap: 48px;
        }
        
        .nav-link {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        
        .nav-logo {
            font-weight: 500;
        }
        
        .nav-action {
            font-weight: 500;
            text-decoration: underline;
        }
        
        .content {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 920px;
            gap: 4px;
            margin: 340px auto 0;
        }
        
        .intro-paragraph {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        
        .intro-text {
            font-size: 32px;
            line-height: 44px;
            font-weight: normal;
            color: black;
        }
        
        .company {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .company-name {
            text-decoration: underline;
            font-size: 32px;
            line-height: 44px;
        }
        
        .custom-logo {
            width: 32px;
            height: 32px;
            background-color: black;
            border-radius: 7px;
            transform: rotate(-6deg);
            overflow: hidden;
        }
        
        .custom-logo img {
            width: 27px;
            height: 27px;
            margin-top: 2px;
            margin-left: 2px;
            transform: rotate(6deg);
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <!-- Navigation -->
            <nav>
                <div class="nav-left">
                    <a class="nav-link nav-logo">A — S</a>
                    <a class="nav-link">About (1)</a>
                    <a class="nav-link">Projects (2)</a>
                </div>
                <a class="nav-link nav-action">Connect</a>
            </nav>
            
            <!-- Main content -->
            <section class="content">
                <div class="intro-paragraph">
                    <span class="intro-text">I'm Andrew, a Senior Experience Designer at</span>
                    <div class="company">
                        <img src="/svg-export-1.svg" alt="Windmill" width="35.07" height="34.21">
                        <span class="company-name intro-text">Windmill,</span>
                    </div>
                </div>
                
                <div class="intro-paragraph">
                    <span class="intro-text">passionate about crafting intuitive, purposeful experiences</span>
                </div>
                
                <div class="intro-paragraph">
                    <span class="intro-text">where design meets impact. I'm also building</span>
                    <div class="company">
                        <div class="custom-logo">
                            <img src="/subtract.svg" alt="Expensa">
                        </div>
                        <span class="company-name intro-text">Expensa,</span>
                    </div>
                </div>
                
                <div class="intro-paragraph">
                    <span class="intro-text">an expense management app - driven by my curiosity</span>
                </div>
                
                <div class="intro-paragraph">
                    <span class="intro-text">for AI and thoughtful UX</span>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
