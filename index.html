    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <!-- Apply saved theme before paint to avoid a flash of the wrong theme -->
    <script>
        (function () {
            var t = 'dark';
            try { t = localStorage.getItem('theme') || 'dark'; } catch (e) {}
            document.documentElement.setAttribute('data-theme', t);
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute('content', t === 'light' ? '#ffffff' : '#000000');
        })();
    </script>

    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --muted-bg: #1a1a1a;
            --muted-text: #888888;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            color-scheme: dark;
        }
        :root[data-theme="light"] {
            --bg: #ffffff;
            --text: #000000;
            --muted-bg: #f8f8f8;
            --muted-text: #999999;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            color-scheme: light;
        }
        html {
            background-color: var(--bg);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Geist', sans-serif;
            background-color: var(--bg);
            color: var(--text);
        }
        body, body * {
            transition: background-color .25s ease, color .25s ease, border-color .25s ease, fill .25s ease, stroke .25s ease;
        }
        header {
            height: 72px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
        }
        .logo {
            font-size: 16px;
            line-height: 24px;
            color: var(--text);
            font-weight: normal;
        }
        .visitor-counter {
            position: absolute;
            right: 24px;
            font-size: 16px;
            color: var(--text);
            font-family: 'Geist', sans-serif;
        }
        .theme-toggle {
            position: absolute;
            left: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }
        .theme-toggle svg {
            display: block;
        }
        .theme-toggle .icon-moon {
            display: none;
        }
        :root[data-theme="light"] .theme-toggle .icon-sun {
            display: none;
        }
        :root[data-theme="light"] .theme-toggle .icon-moon {
            display: block;
        }
    </style>
</head>

        <!-- JavaScript: visitor counter (Cloudflare Worker) + theme toggle -->
        <script>
            const COUNTER_API = 'https://visitor-counter.5yjxrnsdbx.workers.dev';

            document.addEventListener('DOMContentLoaded', async function () {
                // --- Theme toggle ---
                const root = document.documentElement;
                const toggle = document.getElementById('themeToggle');
                const themeMeta = document.querySelector('meta[name="theme-color"]');
                if (toggle) {
                    toggle.addEventListener('click', function () {
                        const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                        root.setAttribute('data-theme', next);
                        try { localStorage.setItem('theme', next); } catch (e) {}
                        if (themeMeta) themeMeta.setAttribute('content', next === 'light' ? '#ffffff' : '#000000');
                    });
                }

                // --- Visitor counter ---
                const el = document.getElementById('counter');
                const NUMBER_KEY = 'visitorNumber';

                try {
                    // Персональний номер відвідувача зберігаємо один раз на цей браузер.
                    let myNumber = localStorage.getItem(NUMBER_KEY);

                    if (myNumber === null) {
                        // Перший захід → беремо наступний номер у глобального лічильника.
                        const res = await fetch(COUNTER_API, { method: 'POST' });
                        const data = await res.json();
                        myNumber = data.count;
                        localStorage.setItem(NUMBER_KEY, myNumber);
                    }

                    el.textContent = 'Hello, visitor #' + Number(myNumber).toLocaleString('en-US');
                } catch (e) {
                    // Якщо лічильник недоступний — нічого не показуємо, сайт не ламається.
                    el.textContent = '';
                }
            });
        </script>
