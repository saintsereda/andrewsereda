<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew's Portfolio</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
        }
        
        .container {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-left {
            display: flex;
            gap: 48px;
        }
        
        .nav-link {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        
        .nav-logo {
            font-weight: 500;
        }
        
        .nav-action {
            font-weight: 500;
            text-decoration: underline;
        }
        
        .content {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 920px;
            gap: 4px;
            margin: 340px auto 0;
        }
        
                .intro-paragraph {
            display: block;
            width: 100%;
            font-size: 32px;
            line-height: 44px;
            font-weight: normal;
            color: black;
            transition: opacity 0.3s ease;
        }
        
        .intro-text {
            font-size: 32px;
            line-height: 44px;
            font-weight: normal;
            color: black;
        }
        
        .company {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            vertical-align: middle;
            cursor: pointer;
        }
        
        /* Hover effects for the company sections */
        .company-windmill:hover ~ .intro-paragraph,
        .company-expensa:hover ~ .intro-paragraph,
        .company-windmill:hover ~ .intro-paragraph .company:not(.company-windmill),
        .company-expensa:hover ~ .intro-paragraph .company:not(.company-expensa),
        .intro-paragraph:has(.company-windmill:hover) ~ .intro-paragraph,
        .intro-paragraph:has(.company-expensa:hover) ~ .intro-paragraph,
        body:has(.company-windmill:hover) .intro-paragraph:not(:has(.company-windmill)),
        body:has(.company-expensa:hover) .intro-paragraph:not(:has(.company-expensa)) {
            opacity: 0.64;
        }
        
        .company-name {
            text-decoration: underline;
            font-size: 32px;
            line-height: 44px;
        }
        
        .custom-logo {
            width: 32px;
            height: 32px;
            background-color: black;
            border-radius: 7px;
            transform: rotate(-6deg);
            overflow: hidden;
        }
        
        .custom-logo img {
            width: 27px;
            height: 27px;
            margin-top: 2px;
            margin-left: 2px;
            transform: rotate(6deg);
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <!-- Navigation -->
            <nav>
                <div class="nav-left">
                    <a class="nav-link nav-logo">A — S</a>
                    <a class="nav-link">About (1)</a>
                    <a class="nav-link">Projects (2)</a>
                </div>
                <a class="nav-link nav-action">Connect</a>
            </nav>
            
            <!-- Main content -->
            <section class="content">
                <p class="intro-paragraph">
                    I'm Andrew, a Senior Experience Designer at
                    <span class="company company-windmill">
                        <img src="/windmill.svg" alt="Windmill" width="35.07" height="34.21">
                        <span class="company-name">Windmill,</span>
                    </span>
                </p>
                
                <p class="intro-paragraph">
                    passionate about crafting intuitive, purposeful experiences
                </p>
                
                <p class="intro-paragraph">
                    where design meets impact. I'm also building
                    <span class="company company-expensa">
                        <span class="custom-logo">
                            <img src="/expensa.svg" alt="Expensa">
                        </span>
                        <span class="company-name">Expensa,</span>
                    </span>
                </p>
                
                <p class="intro-paragraph">
                    an expense management app - driven by my curiosity
                </p>
                
                <p class="intro-paragraph">
                    for AI and thoughtful UX
                </p>
            </section>
        </div>
    </main>
</body>
</html>
