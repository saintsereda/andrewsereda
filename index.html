<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrew's Portfolio</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
            overflow-x: hidden; /* Prevent horizontal scrolling */
        }
        
        .container {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            box-sizing: border-box; /* Include padding in width calculation */
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-left {
            display: flex;
            gap: 48px;
        }
        
        .nav-link {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        
        .nav-logo {
            font-weight: 500;
        }
        
        .nav-action {
            font-weight: 500;
            text-decoration: underline;
        }
        
        .content {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 920px;
            margin: 340px auto 0;
            padding: 0 16px;
            box-sizing: border-box;
        }
        
        .intro-paragraph {
            display: block;
            width: 100%;
            font-size: 32px;
            line-height: 44px;
            font-weight: normal;
            color: black;
            margin: 0; /* Remove default paragraph margins */
            padding: 0; /* Remove default paragraph padding */
            word-wrap: break-word; /* Allow long words to break */
            overflow-wrap: break-word;
            margin-bottom: 10px; /* Add space between paragraphs */
        }
        
        .text-part {
            transition: opacity 0.3s ease;
            display: inline; /* Ensure inline display */
        }
        
        .company {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            vertical-align: middle;
            cursor: pointer;
            transition: opacity 0.3s ease;
            text-decoration: none; /* Remove default link underline */
            color: inherit; /* Inherit text color */
        }
        
        .company-name {
            text-decoration: underline;
            font-size: 32px;
            line-height: 44px;
            font-weight: 500; /* Make company names slightly bolder */
        }
        
        /* Media queries for responsive design */
        @media (max-width: 768px) {
            .intro-paragraph {
                font-size: 24px;
                line-height: 34px;
                margin-bottom: 14px; /* Add space between paragraphs on mobile */
            }
            
            .company-name {
                font-size: 24px;
                line-height: 34px;
            }
            
            .content {
                margin-top: 200px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            
            .intro-paragraph {
                font-size: 20px;
                line-height: 32px; /* Increased line-height for better readability */
                margin-bottom: 20px; /* Add more space between paragraphs on smallest screens */
            }
            
            .company-name {
                font-size: 20px;
                line-height: 32px;
            }
            
            .content {
                margin-top: 120px;
            }
            
            /* Adjust company display for mobile */
            .company {
                display: inline-flex;
                white-space: nowrap; /* Prevent breaking within company elements */
            }
            
            /* Nav adjustments for mobile */
            .nav-left {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <!-- Navigation -->
            <nav>
                <div class="nav-left">
                    <a class="nav-link nav-logo">A — S</a>
                    <a class="nav-link">About (1)</a>
                    <a class="nav-link">Projects (2)</a>
                </div>
                <a class="nav-link nav-action">Connect</a>
            </nav>
            
            <!-- Main content -->
            <section class="content">
                <p class="intro-paragraph">
                    <span class="text-part">I'm Andrew, a Senior Experience Designer at</span>
                    <a href="https://www.windmill.digital" class="company company-windmill">
                        <span class="company-name">Windmill,</span>
                    </a>
                </p>
                
                <p class="intro-paragraph">
                    <span class="text-part">passionate about crafting intuitive, purposeful experiences</span>
                </p>
                
                <p class="intro-paragraph">
                    <span class="text-part">where design meets impact. I'm also building</span>
                    <a href="https://www.getexpensa.app" class="company company-expensa">
                        <span class="company-name">Expensa,</span>
                    </a>
                </p>
                
                <p class="intro-paragraph">
                    <span class="text-part">an expense management app - driven by my curiosity</span>
                </p>
                
                <p class="intro-paragraph">
                    <span class="text-part">for AI and thoughtful UX</span>
                </p>
            </section>
        </div>
    </main>

    <script>
        // JavaScript for hover effect with text-part targeting
        document.querySelectorAll('.company-windmill, .company-expensa').forEach(company => {
            company.addEventListener('mouseenter', () => {
                // Fade all text parts and companies
                document.querySelectorAll('.text-part, .company').forEach(el => {
                    el.style.opacity = '0.64';
                });
                // Keep only the hovered company at full opacity
                company.style.opacity = '1';
            });
            
            company.addEventListener('mouseleave', () => {
                // Restore all to full opacity
                document.querySelectorAll('.text-part, .company').forEach(el => {
                    el.style.opacity = '1';
                });
            });
        });
    </script>
</body>
</html>
